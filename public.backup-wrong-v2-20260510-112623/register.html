<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Regjistrim | Portal Porosive</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; font-family: 'Inter', sans-serif; margin: 0; }
    .auth-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    .auth-head { text-align: center; margin-bottom: 2rem; }
    .auth-head img { max-width: 150px; margin-bottom: 1rem; }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; }
    input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    .btn-auth { width: 100%; padding: 0.8rem; background: #000; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
    .btn-auth:hover { background: #333; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #666; }
    .auth-footer a { color: #000; text-decoration: none; font-weight: 600; }
    .error-msg { color: red; font-size: 0.8rem; margin-top: 0.5rem; display: none; text-align: center; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-head">
      <img src="./assets/vloralumin-logo-header.png" alt="Vlora Alumin" />
      <h2>Krijo Llogarinë</h2>
    </div>
    <form id="regForm">
      <div class="form-group">
        <label>Emri i Përdoruesit</label>
        <input type="text" name="username" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label>Fjalëkalimi</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn-auth">Regjistrohu</button>
      <div id="error" class="error-msg"></div>
    </form>
    <div class="auth-footer">
      Ke llogari? <a href="/login">Hyr këtu</a>
    </div>
  </div>

  <script>
    document.getElementById('regForm').onsubmit = async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (res.ok) {
        alert('Regjistrimi u krye me sukses! Ju lutem prisni aprovimin e administratorit.');
        window.location.href = '/login';
      } else {
        const err = document.getElementById('error');
        err.innerText = result.error;
        err.style.display = 'block';
      }
    };
  </script>
</body>
</html>
